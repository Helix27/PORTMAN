{% extends "base.html" %}

{% block title %}Vessel Category Master - PORTMAN{% endblock %}

{% block content %}
<div class="module-header">
    <h2>Vessel Category Master</h2>
    <span class="module-code">VCM01</span>
    <span id="saveStatus" class="save-status"></span>
</div>

<div class="toolbar">
    <button class="btn btn-add" onclick="addRow()">+ Add Row</button>
    <button class="btn btn-delete" onclick="deleteSelected()">Delete Selected</button>
    <button class="btn btn-save" onclick="saveAll()">Save (Ctrl+S)</button>
    <div class="row-info">
        Rows: <span id="rowCount">0</span> / <span id="totalCount">0</span>
    </div>
</div>

<div id="table"></div>
{% endblock %}

{% block scripts %}
<script>
    addToRecent('VCM01', 'Vessel Category Master');

    let table;
    let dirtyRows = new Set();
    let autosaveTimer = null;
    const MODULE = 'VCM01';

    function showStatus(message, type) {
        const status = document.getElementById('saveStatus');
        status.textContent = message;
        status.className = 'save-status ' + type;
        if (type === 'saved') {
            setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 2000);
        }
    }

    async function saveRow(rowData, rowComponent) {
        try {
            const res = await fetch(`/api/module/${MODULE}/save`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(rowData)
            });
            const data = await res.json();
            if (data.id && !rowData.id) {
                rowComponent.update({id: data.id});
            }
            return true;
        } catch (e) {
            console.error('Save failed:', e);
            return false;
        }
    }

    async function saveAll() {
        showStatus('Saving...', 'saving');
        const rows = table.getRows();
        let savedCount = 0;
        for (const row of rows) {
            const data = row.getData();
            const rowIndex = row.getPosition();
            // Skip empty rows
            if (!data.name || !data.name.trim()) {
                if (!data.id) continue; // Don't save new empty rows
            }
            if (dirtyRows.has(rowIndex) || !data.id) {
                const success = await saveRow(data, row);
                if (success) savedCount++;
            }
        }
        dirtyRows.clear();
        if (savedCount > 0) {
            showStatus(`Saved ${savedCount} row(s)`, 'saved');
        } else {
            showStatus('No changes to save', 'saved');
        }
    }

    function scheduleAutosave() {
        if (autosaveTimer) clearTimeout(autosaveTimer);
        showStatus('Unsaved changes', 'unsaved');
        autosaveTimer = setTimeout(() => {
            saveAll();
        }, 2000);
    }

    const columns = [
        {formatter: "rowSelection", titleFormatter: "rowSelection", hozAlign: "center", headerSort: false, width: 40},
        {title: "Vessel Category Name", field: "name", editor: "input", width: 300},
    ];

    table = new Tabulator("#table", {
        height: "calc(100vh - 160px)",
        layout: "fitDataFill",
        columns: columns,
        pagination: true,
        paginationMode: "remote",
        paginationSize: 20,
        paginationSizeSelector: [10, 20, 50, 100],
        ajaxURL: `/api/module/${MODULE}/data`,
        ajaxResponse: function(url, params, response) {
            document.getElementById('rowCount').textContent = response.data.length;
            document.getElementById('totalCount').textContent = response.total;
            return response;
        },
        selectable: true,
        selectableRangeMode: "click",
        cellEdited: function(cell) {
            const rowIndex = cell.getRow().getPosition();
            dirtyRows.add(rowIndex);
            scheduleAutosave();
        }
    });

    function addRow() {
        table.addRow({}, false);
    }

    function deleteSelected() {
        const selected = table.getSelectedRows();
        if (selected.length === 0) {
            alert('Select rows to delete');
            return;
        }
        if (!confirm(`Delete ${selected.length} row(s)?`)) return;
        selected.forEach(row => {
            const id = row.getData().id;
            if (id) {
                fetch(`/api/module/${MODULE}/delete`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id: id})
                });
            }
            row.delete();
        });
    }

    function updateTableTheme() {
        if (document.body.classList.contains('dark-theme')) {
            document.getElementById('table').classList.add('tabulator-dark');
        } else {
            document.getElementById('table').classList.remove('tabulator-dark');
        }
    }
    if (localStorage.getItem('theme') === 'dark') updateTableTheme();

    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            saveAll();
        }
    });
</script>
{% endblock %}
